<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Condensé Temps par Agent</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --surface2: #F0EEE8;
    --border: #E2DFD8;
    --text: #1A1916;
    --text2: #6B6860;
    --text3: #A8A49C;
    --accent: #2D5BE3;
    --accent-light: #EBF0FD;
    --green: #1A7A4A;
    --green-light: #E6F4ED;
    --amber: #B45309;
    --amber-light: #FEF3C7;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ─── HEADER ─── */
  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .header-left h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  .header-left p {
    font-size: 12px;
    color: var(--text2);
    margin-top: 2px;
  }

  /* ─── FILTER PILLS ─── */
  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-label {
    font-size: 11px;
    color: var(--text3);
    margin-right: 2px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .pill {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .pill:hover { border-color: var(--accent); color: var(--accent); }
  .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ─── STAT CARDS ─── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
  }
  .stat-card .label {
    font-size: 11px;
    color: var(--text3);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 4px;
  }
  .stat-card .value {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    letter-spacing: -0.5px;
  }
  .stat-card .unit {
    font-size: 11px;
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    margin-left: 3px;
  }
  .stat-card .sub {
    font-size: 11px;
    color: var(--text2);
    margin-top: 2px;
  }

  /* ─── AGENT LIST ─── */
  .agent-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 8px;
    transition: box-shadow 0.15s;
  }
  .agent-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.07); }

  .agent-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    cursor: pointer;
    gap: 12px;
  }
  .agent-header:hover .agent-name { color: var(--accent); }

  .agent-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
  .avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
    flex-shrink: 0;
  }
  .agent-info { min-width: 0; }
  .agent-name {
    font-size: 14px; font-weight: 500;
    color: var(--text);
    transition: color 0.15s;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .agent-meta { font-size: 11px; color: var(--text3); margin-top: 1px; }

  .agent-right { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
  .prog-badges { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
  .prog-badge {
    font-size: 10px; font-weight: 500;
    padding: 2px 7px; border-radius: 4px;
    white-space: nowrap;
  }
  .agent-total-block { text-align: right; }
  .agent-total {
    font-size: 16px; font-weight: 600;
    font-family: 'DM Mono', monospace;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .agent-pct { font-size: 11px; color: var(--text3); }
  .chevron {
    font-size: 10px; color: var(--text3);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .chevron.open { transform: rotate(180deg); }

  /* ─── DETAIL PANEL ─── */
  .detail-panel {
    display: none;
    border-top: 1px solid var(--border);
    padding: 0;
  }
  .detail-panel.open { display: block; }

  .detail-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    padding: 0 14px;
    background: var(--surface2);
  }
  .detail-tab {
    font-size: 12px; font-weight: 500;
    padding: 8px 12px;
    cursor: pointer;
    color: var(--text2);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .detail-tab:hover { color: var(--accent); }
  .detail-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .detail-content { padding: 12px 14px; }

  .detail-table {
    width: 100%; border-collapse: collapse;
    font-size: 12px;
  }
  .detail-table th {
    color: var(--text3); font-weight: 500;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px;
    padding: 0 6px 6px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .detail-table th:not(:first-child) { text-align: right; }
  .detail-table td {
    padding: 5px 6px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .detail-table td:not(:first-child) { text-align: right; }
  .detail-table tr:last-child td { border-bottom: none; }
  .detail-table tr:hover td { background: var(--surface2); }

  .bar-cell { display: flex; align-items: center; gap: 8px; }
  .bar-track {
    flex: 1; height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
    min-width: 40px;
  }
  .bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

  .zero { color: var(--text3); }

  /* ─── EMPTY / LOADING ─── */
  .state-box {
    text-align: center;
    padding: 48px 24px;
    color: var(--text2);
  }
  .state-box .icon { font-size: 32px; margin-bottom: 12px; }
  .state-box h2 { font-size: 15px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
  .state-box p { font-size: 13px; line-height: 1.6; color: var(--text2); max-width: 320px; margin: 0 auto; }
  .state-box code {
    background: var(--surface2); border: 1px solid var(--border);
    padding: 2px 6px; border-radius: 4px;
    font-family: 'DM Mono', monospace; font-size: 11px;
  }

  /* ─── SORT TOGGLE ─── */
  .sort-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px;
  }
  .sort-row span { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.4px; }
  .sort-btn {
    font-size: 11px; padding: 3px 9px;
    border-radius: 4px; cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface); color: var(--text2);
    transition: all 0.15s;
  }
  .sort-btn.active { background: var(--surface2); color: var(--text); font-weight: 500; }

  /* ─── YEAR SUMMARY IN DETAIL ─── */
  .year-summary {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 8px;
    margin-bottom: 12px;
  }
  .year-card {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    text-align: center;
  }
  .year-card .y-label { font-size: 11px; color: var(--text3); font-weight: 500; }
  .year-card .y-val {
    font-size: 15px; font-weight: 600;
    font-family: 'DM Mono', monospace;
    color: var(--text);
    margin-top: 2px;
  }
</style>
</head>
<body>

<div id="app">
  <div class="state-box">
    <div class="icon">⏳</div>
    <h2>Connexion à Grist…</h2>
    <p>En attente des données de la table active.</p>
  </div>
</div>

<script>
// ─── PALETTE ───────────────────────────────────────────────────────────────
const PALETTE = [
  { bg:'#EBF0FD', text:'#1D3EA8', fill:'#2D5BE3' },
  { bg:'#E6F4ED', text:'#145C35', fill:'#1A7A4A' },
  { bg:'#FEF3C7', text:'#92400E', fill:'#D97706' },
  { bg:'#FCE7F3', text:'#831843', fill:'#DB2777' },
  { bg:'#F3E8FF', text:'#5B21B6', fill:'#7C3AED' },
  { bg:'#ECFDF5', text:'#064E3B', fill:'#059669' },
  { bg:'#FFF7ED', text:'#7C2D12', fill:'#EA580C' },
  { bg:'#EFF6FF', text:'#1E3A8A', fill:'#3B82F6' },
];

function palFor(i) { return PALETTE[i % PALETTE.length]; }
function initials(name) { return name.trim().split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function fmt(v) { return v.toFixed(3); }

// ─── STATE ─────────────────────────────────────────────────────────────────
let state = {
  agents: [],        // [{name, programs:[{prog, months:[{date,val}]}]}]
  filter: null,      // selected program name, or null = all
  openAgent: null,
  openTab: {},       // agentIdx -> prog name
  sortBy: 'value',   // 'value' | 'name'
  programs: [],      // all program names found
};

// ─── GRIST API ─────────────────────────────────────────────────────────────
// The widget reads the *currently mapped table* via grist.onRecords.
// Column mapping expected:
//   - B: date column (mois/année)
//   - C+: one column per program (header = program name, value = personnes/mois)
// Table name = agent name (Grist table id or displayed label)
// 
// We also support multi-table mode: the widget can read N tables if the
// user maps them via grist.ready({ columns: [...], allowSelectBy: true })
// In single-table mode we use the table name as the agent name.

grist.ready({
  requiredAccess: 'read table',
  columns: [
    { name: 'date',  title: 'Date (mois/année)', type: 'Text,Date,DateTime,Any', strictType: false },
  ],
  onEditOptions() {},
});

// Listen to all mapped table records
grist.onRecords(function(records, mappings) {
  if (!records || records.length === 0) {
    showEmpty();
    return;
  }
  parseTable(records, mappings);
});

// Also try to get table name for the agent label
let currentTableName = '';
grist.on('message', function(msg) {
  if (msg && msg.tableId) currentTableName = msg.tableId;
});

// ─── PARSE ─────────────────────────────────────────────────────────────────
// Format de table Grist correspondant aux fichiers :
//   col B = date (string like "Janvier 2021")
//   col C = Giant Leaps (ou autres programmes)
//   … colonnes suivantes = autres programmes éventuels
// La ligne "Total" est ignorée (date = 'Total' ou null)

function parseTable(records, mappings) {
  // Detect columns: all columns except row id
  if (!records.length) return showEmpty();

  const sample = records[0];
  const allKeys = Object.keys(sample).filter(k => k !== 'id');

  // Find date column: first text-like column, or mapped 'date'
  let dateKey = mappings && mappings.date ? mappings.date : null;
  if (!dateKey) {
    // heuristic: column whose values look like month strings
    for (const k of allKeys) {
      const v = sample[k];
      if (typeof v === 'string' && /jan|fév|mar|avr|mai|juin|juil|août|sep|oct|nov|déc/i.test(v)) {
        dateKey = k; break;
      }
    }
    if (!dateKey) dateKey = allKeys[0];
  }

  // Program columns = all numeric columns except dateKey
  const progKeys = allKeys.filter(k => k !== dateKey && typeof records.find(r=>r[k]!==0&&r[k]!=null)?.[k] === 'number');

  if (!progKeys.length) {
    showError('Aucune colonne numérique de programme détectée.<br>Vérifiez le mapping des colonnes.');
    return;
  }

  // Filter out Total row (date cell = 'Total' or numeric, and value is a sum)
  const dataRows = records.filter(r => {
    const d = r[dateKey];
    if (!d) return false;
    if (typeof d === 'string' && d.trim().toLowerCase() === 'total') return false;
    // Also filter rows where the date cell is a number (sequence number col leaked in)
    return true;
  });

  // Agent name = table name or first non-empty text in records header area
  // We derive it from grist table context; fallback to 'Agent'
  const agentName = deriveAgentName(records, dateKey);

  // Build programs
  const programs = progKeys.map(pk => {
    const colName = pk; // Grist column name
    const months = dataRows
      .filter(r => r[pk] && r[pk] !== 0)
      .map(r => ({ date: String(r[dateKey]).trim(), val: Number(r[pk]) }));
    return { prog: colName, months };
  });

  // Merge into state.agents (one table = one agent in this call)
  // For multi-agent support, we accumulate across multiple onRecords calls
  // identified by table name
  const existing = state.agents.findIndex(a => a.name === agentName);
  const agentObj = { name: agentName, programs };
  if (existing >= 0) state.agents[existing] = agentObj;
  else state.agents.push(agentObj);

  // Collect all programs
  state.programs = [...new Set(state.agents.flatMap(a => a.programs.map(p => p.prog)))];
  if (!state.filter) state.filter = state.programs[0] || null;

  render();
}

function deriveAgentName(records, dateKey) {
  // Try to get from grist table metadata
  if (currentTableName) return currentTableName.replace(/_/g,' ');
  // Fallback: look for a record that has a string in a non-date col that looks like a name
  return 'Agent';
}

// ─── COMPUTED ──────────────────────────────────────────────────────────────
function agentTotal(agent, progFilter) {
  if (progFilter) {
    const p = agent.programs.find(p => p.prog === progFilter);
    return p ? p.months.reduce((s,m)=>s+m.val,0) : 0;
  }
  return agent.programs.reduce((s,p)=>s+p.months.reduce((a,m)=>a+m.val,0),0);
}

function grandTotal(progFilter) {
  return state.agents.reduce((s,a)=>s+agentTotal(a,progFilter),0);
}

function yearBreakdown(months) {
  const byYear = {};
  for (const m of months) {
    const yr = m.date.match(/\d{4}/)?.[0] || '?';
    byYear[yr] = (byYear[yr]||0) + m.val;
  }
  return byYear;
}

// ─── RENDER ────────────────────────────────────────────────────────────────
function render() {
  if (!state.agents.length) { showEmpty(); return; }

  const gt = grandTotal(state.filter);
  const sortedAgents = [...state.agents].sort((a,b) => {
    if (state.sortBy === 'name') return a.name.localeCompare(b.name);
    return agentTotal(b, state.filter) - agentTotal(a, state.filter);
  });
  const topAgent = sortedAgents[0];

  // Stats
  const statsHtml = `
    <div class="stats-row">
      <div class="stat-card">
        <div class="label">Total équipe</div>
        <div class="value">${fmt(gt)}<span class="unit">p/m</span></div>
        <div class="sub">${state.filter || 'tous programmes'}</div>
      </div>
      <div class="stat-card">
        <div class="label">Agents</div>
        <div class="value">${state.agents.length}</div>
        <div class="sub">${state.programs.length} programme${state.programs.length>1?'s':''}</div>
      </div>
      <div class="stat-card">
        <div class="label">Top contributeur</div>
        <div class="value" style="font-size:13px;padding-top:3px;font-family:'DM Sans'">${topAgent.name}</div>
        <div class="sub">${fmt(agentTotal(topAgent, state.filter))} p/m — ${gt>0?Math.round(agentTotal(topAgent,state.filter)/gt*100):0}%</div>
      </div>
    </div>`;

  // Filter pills
  const pillsHtml = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap">
      <div class="filters">
        <span class="filter-label">Programme :</span>
        ${state.programs.map(p=>`<span class="pill${state.filter===p?' active':''}" onclick="setFilter('${escHtml(p)}')">${escHtml(p)}</span>`).join('')}
        ${state.programs.length>1?`<span class="pill${state.filter===null?' active':''}" onclick="setFilter(null)">Tous</span>`:''}
      </div>
      <div style="margin-left:auto;display:flex;gap:6px;align-items:center">
        <span style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.4px">Tri :</span>
        <span class="sort-btn${state.sortBy==='value'?' active':''}" onclick="setSort('value')">Valeur ↓</span>
        <span class="sort-btn${state.sortBy==='name'?' active':''}" onclick="setSort('name')">Nom A→Z</span>
      </div>
    </div>`;

  // Agents
  const agentsHtml = sortedAgents.map((agent, si) => {
    const oi = state.agents.indexOf(agent);
    const c = palFor(oi);
    const total = agentTotal(agent, state.filter);
    const pct = gt > 0 ? Math.round(total/gt*100) : 0;
    const isOpen = state.openAgent === oi;

    // Program badges
    const badges = agent.programs.map(p=>
      `<span class="prog-badge" style="background:${palFor(state.programs.indexOf(p.prog)).bg};color:${palFor(state.programs.indexOf(p.prog)).text}">${escHtml(p.prog)}</span>`
    ).join('');

    // Detail
    let detailHtml = '';
    if (isOpen) {
      const visProgs = state.filter ? agent.programs.filter(p=>p.prog===state.filter) : agent.programs;
      const activeProg = state.openTab[oi] || (visProgs[0]?.prog);

      // tabs
      const tabsHtml = visProgs.length > 1 ? `
        <div class="detail-tabs">
          ${visProgs.map(p=>`<span class="detail-tab${activeProg===p.prog?' active':''}" onclick="setTab(${oi},'${escHtml(p.prog)}')">${escHtml(p.prog)}</span>`).join('')}
        </div>` : '';

      const prog = visProgs.find(p=>p.prog===activeProg) || visProgs[0];
      let tableBody = '';
      if (prog && prog.months.length) {
        const maxVal = Math.max(...prog.months.map(m=>m.val));
        const byYear = yearBreakdown(prog.months);
        const yearCards = Object.entries(byYear).map(([yr,v])=>`
          <div class="year-card">
            <div class="y-label">${yr}</div>
            <div class="y-val">${fmt(v)}</div>
          </div>`).join('');

        tableBody = prog.months.map(m=>`
          <tr>
            <td>${escHtml(m.date)}</td>
            <td><div class="bar-cell">
              <div class="bar-track"><div class="bar-fill" style="width:${maxVal>0?Math.round(m.val/maxVal*100):0}%;background:${c.fill}"></div></div>
              <span style="min-width:50px;text-align:right">${fmt(m.val)}</span>
            </div></td>
          </tr>`).join('');

        detailHtml = `
          <div class="detail-panel open">
            ${tabsHtml}
            <div class="detail-content">
              <div class="year-summary">${yearCards}</div>
              <table class="detail-table">
                <thead><tr><th>Mois</th><th>p/m</th></tr></thead>
                <tbody>${tableBody}</tbody>
              </table>
            </div>
          </div>`;
      } else {
        detailHtml = `<div class="detail-panel open"><div class="detail-content"><p style="color:var(--text3);font-size:12px;padding:8px 0">Aucune donnée pour ce programme.</p></div></div>`;
      }
    }

    return `
      <div class="agent-card">
        <div class="agent-header" onclick="toggleAgent(${oi})">
          <div class="agent-left">
            <div class="avatar" style="background:${c.bg};color:${c.text}">${initials(agent.name)}</div>
            <div class="agent-info">
              <div class="agent-name">${escHtml(agent.name)}</div>
              <div class="agent-meta">${agent.programs.length} programme${agent.programs.length>1?'s':''}</div>
            </div>
          </div>
          <div class="agent-right">
            <div class="prog-badges">${badges}</div>
            <div class="agent-total-block">
              <div class="agent-total">${fmt(total)}</div>
              <div class="agent-pct">${pct}% du total</div>
            </div>
            <span class="chevron${isOpen?' open':''}">▼</span>
          </div>
        </div>
        ${detailHtml}
      </div>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="header-left">
        <h1>Condensé — Temps par agent</h1>
        <p>Données exprimées en personnes/mois · ${state.agents.length} table${state.agents.length>1?'s':''} chargée${state.agents.length>1?'s':''}</p>
      </div>
    </div>
    ${statsHtml}
    ${pillsHtml}
    <div id="agent-list">${agentsHtml}</div>`;
}

// ─── MULTI-TABLE SUPPORT ───────────────────────────────────────────────────
// Grist allows a widget to subscribe to multiple tables via onRecords.
// We listen to the "select" event and also handle initial load.
// To truly aggregate N tables, the user must configure the widget to 
// access each table. We expose a helper that the user can call from 
// the widget configuration panel.

// Listen for table switch (user selects a different table)
grist.on('message', function(msg) {
  if (msg && msg.type === 'tableId') {
    currentTableName = msg.tableId;
  }
});

// ─── ACTIONS ───────────────────────────────────────────────────────────────
function toggleAgent(i) {
  state.openAgent = state.openAgent === i ? null : i;
  render();
}
function setFilter(p) {
  state.filter = p;
  state.openAgent = null;
  render();
}
function setSort(s) {
  state.sortBy = s;
  render();
}
function setTab(agentIdx, prog) {
  state.openTab[agentIdx] = prog;
  render();
}

// ─── UTILS ─────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showEmpty() {
  document.getElementById('app').innerHTML = `
    <div class="state-box">
      <div class="icon">📋</div>
      <h2>Aucune donnée chargée</h2>
      <p>Mappez une table Grist sur ce widget.<br>
         La table doit avoir une colonne <code>date</code> (mois/année) et au moins une colonne numérique par programme.</p>
    </div>`;
}
function showError(msg) {
  document.getElementById('app').innerHTML = `
    <div class="state-box">
      <div class="icon">⚠️</div>
      <h2>Problème de lecture</h2>
      <p>${msg}</p>
    </div>`;
}
